<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desk App</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0a0a0a;
        color: #e4e4e7;
        -webkit-app-region: drag;
        user-select: none;
        overflow: hidden;
      }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 28px;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.25);
      }

      .logo svg {
        width: 40px;
        height: 40px;
        fill: none;
        stroke: white;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .app-name {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #fafafa;
      }

      .progress-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 240px;
      }

      .progress-track {
        width: 100%;
        height: 3px;
        background: #27272a;
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        transition: width 0.3s ease;
        width: 0%;
      }

      .progress-bar.indeterminate {
        width: 40%;
        animation: indeterminate 1.4s ease-in-out infinite;
      }

      @keyframes indeterminate {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      .status-text {
        font-size: 13px;
        color: #71717a;
        min-height: 18px;
        text-align: center;
      }

      .version {
        position: fixed;
        bottom: 16px;
        font-size: 11px;
        color: #3f3f46;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">
        <svg viewBox="0 0 24 24" role="img" aria-label="Desk App">
          <rect x="3" y="3" width="18" height="14" rx="2" ry="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
      </div>
      <div class="app-name">Desk App</div>
      <div class="progress-area">
        <div class="progress-track">
          <div class="progress-bar indeterminate" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText">正在启动...</div>
      </div>
      <div class="version" id="versionText">v0.1.0</div>
    </div>
    <script>
      const bar = document.getElementById("progressBar");
      const text = document.getElementById("statusText");

      const off = window.electronAPI?.ipc?.on("splash:status", (status) => {
        if (text) text.textContent = status.message;

        if (!bar) return;
        if (status.progress >= 0) {
          bar.classList.remove("indeterminate");
          bar.style.width = `${Math.round(status.progress * 100)}%`;
        } else {
          bar.classList.add("indeterminate");
          bar.style.width = "40%";
        }
      });
    </script>
  </body>
</html>
